name: Core checks

on:
  push:
  pull_request:

jobs:
  verify-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mali
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - run: uv sync --locked --all-groups
      - run: uv run ruff format --check
      - run: uv run ruff check
      - run: uv run pyright
      - run: uv run pytest
